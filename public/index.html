    <div class="form-row" style="margin:0;padding-top:10px;border-top:1px dashed var(--border)">
      <label class="form-label">Target shift</label>
      <div style="display:flex;gap:8px">
        <button class="loc-opt wilco ${rms.toShift==='morning'?'sel':''}" onclick="rmsSet('toShift','morning')">Morning</button>
        <button class="loc-opt wilco ${rms.toShift==='evening'?'sel':''}" onclick="rmsSet('toShift','evening')">Evening</button>
      </div>
    </div>
    <div class="form-row" style="margin:0">
      <label class="form-label">Target day(s) <span style="font-weight:400;color:var(--muted)">(empty = any day)</span></label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <button class="day-tab ${rms.toDays.length===0?'active':''}" onclick="rmsAnyDay()">Any day</button>
        <span style="color:var(--muted);font-size:11px">or pick specific:</span>
        ${DAYS.map((d,i)=>{
          const sel = rms.toDays.includes(i);
          return `<button class="day-tab ${sel?'active':''}" onclick="rmsToggleToDay(${i})">${d.slice(0,3)}</button>`;
        }).join('')}
      </div>
    </div>
  ` : '';

  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="bgClose(event)">
      <div class="modal" style="width:480px;max-height:90vh;display:flex;flex-direction:column">
        <div class="mhead">
          <div class="mhead-title">${rms.editId?'Edit':'Add'} Change Item</div>
        </div>
        <div class="mbody" style="display:flex;flex-direction:column;gap:16px;overflow-y:auto">
          <div class="form-row" style="margin:0">
            <label class="form-label">Type</label>
            <div style="display:flex;gap:8px">
              <button class="loc-opt satc ${rms.type==='request'?'sel':''}" onclick="rmsSet('type','request')">Coach Request</button>
              <button class="loc-opt pharr ${rms.type==='flexible'?'sel':''}" onclick="rmsSet('type','flexible')">Flexible Option</button>
            </div>
          </div>
          <div class="form-row" style="margin:0">
            <label class="form-label">Coach</label>
            <select class="form-select" onchange="rmsSet('coachId',parseInt(this.value))">
              ${COACHES.filter(c=>c.locs.length).map(c=>`<option value="${c.id}" ${c.id===rms.coachId?'selected':''}>${c.name}</option>`).join('')}
            </select>
          </div>
          <div class="form-row" style="margin:0">
            <label class="form-label">Existing shift to change</label>
            <div style="display:flex;gap:8px">
              <button class="loc-opt wilco ${rms.shift==='morning'?'sel':''}" onclick="rmsSet('shift','morning')">Morning</button>
              <button class="loc-opt wilco ${rms.shift==='evening'?'sel':''}" onclick="rmsSet('shift','evening')">Evening</button>
            </div>
          </div>
          <div class="form-row" style="margin:0">
            <label class="form-label">Action</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              ${actionOpts.map(a=>`<button class="loc-opt satc ${rms.action===a.v?'sel':''}" onclick="rmsSet('action','${a.v}')">${a.l}</button>`).join('')}
            </div>
          </div>
          <div class="form-row" style="margin:0">
            <label class="form-label">${isMove ? 'Move from day' : 'Days'} <span style="font-weight:400;color:var(--muted)">${isMove ? '(pick exactly one)' : '(coach must have that shift on selected days)'}</span></label>
            ${fromDaysHTML}
          </div>
          ${moveSectionHTML}
          ${showLoc?`<div class="form-row" style="margin:0">
            <label class="form-label">${isMove ? 'Target location' : 'New location'}</label>
            <div class="loc-opts">${coach.locs.map(lk=>`<button class="loc-opt ${lk} ${rms.loc===lk?'sel':''}" onclick="rmsSet('loc','${lk}')">${LOCS[lk].name}</button>`).join('')}</div>
          </div>`:''}
          <div class="form-row" style="margin:0">
            <label class="form-label">Notes <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
            <input class="form-input" value="${rms.note}" oninput="rms.note=this.value" placeholder="Any context...">
          </div>
        </div>
        <div class="mfoot">
          <div></div>
          <div class="mfoot-right">
            <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="submitReq()">Save</button>
          </div>
        </div>
      </div>
    </div>`;
}

function rmsSet(key, val) {
  rms[key] = val;
  if (key === 'coachId') { rms.days = []; const c = COACHES.find(c=>c.id===val); rms.loc = c?.locs[0]||null; }
  if (key === 'shift')   {
    rms.days = [];
    if (rms.action !== 'move_day') rms.action = val==='morning'?'to_evening':'to_morning';
  }
  if (key === 'action' && val === 'move_day') {
    // Default target shift to same as source shift; keep days array but clamp to single
    if (rms.toShift == null) rms.toShift = rms.shift;
    if (rms.days.length > 1) rms.days = rms.days.slice(0, 1);
  }
  renderReqModal();
}
function rmsToggleDay(i) {
  if (rms.action === 'move_day') {
    // Single-select for move_day
    rms.days = rms.days[0] === i ? [] : [i];
  } else {
    rms.days = rms.days.includes(i) ? rms.days.filter(d=>d!==i) : [...rms.days,i].sort((a,b)=>a-b);
  }
  renderReqModal();
}
function rmsToggleToDay(i) {
  rms.toDays = rms.toDays.includes(i) ? rms.toDays.filter(d=>d!==i) : [...rms.toDays,i].sort((a,b)=>a-b);
  renderReqModal();
}
function rmsAnyDay() { rms.toDays = []; renderReqModal(); }

function submitReq() {
  const coach = COACHES.find(c=>c.id===rms.coachId);
  const loc   = coach.locs.length===1 ? coach.locs[0] : (rms.loc||coach.locs[0]);
  const payload = {
    type:rms.type, coachId:rms.coachId, shift:rms.shift, action:rms.action,
    days:[...rms.days], loc, note:rms.note,
    toShift: rms.action === 'move_day' ? rms.toShift : undefined,
    toDays:  rms.action === 'move_day' ? [...rms.toDays] : undefined,
  };
  if (rms.editId) {
    const r = requests.find(r=>r.id===rms.editId);
    Object.assign(r, payload);
  } else {
    requests.unshift({ id:Date.now(), ...payload, status:'pending', createdAt:new Date().toISOString() });
  }
  saveReqs(); updateReqBadge(); closeModal(); renderRequests();
}

function editReq(id) {
  const r = requests.find(r=>r.id===id);
  rms = {
    type:r.type, coachId:r.coachId, shift:r.shift, action:r.action,
    days:[...(r.days||[])], loc:r.loc, note:r.note, editId:id,
    toShift: r.toShift || r.shift,
    toDays:  [...(r.toDays || [])],
  };
  renderReqModal();
}

// ── PREVIEW & APPLY ───────────────────────────────────────────────────────────
function previewReq(id) {
  const r     = requests.find(r=>r.id===id);
  const coach = COACHES.find(c=>c.id===r.coachId);

  if (r.action === 'move_day') return previewMoveDay(r);

  const rows = r.days.map(dayIdx => {
    const cur      = gs(r.coachId, dayIdx);
    const fromLoc  = cur[r.shift];
    const toLoc    = r.action === 'remove' ? null : r.loc;

    // Shifts affected per location
    const impacts = [];

    if (fromLoc) {
      const capBefore = getCap(fromLoc, dayIdx, r.shift);
      const cntBefore = COACHES.filter(c=>gs(c.id,dayIdx)[r.shift]===fromLoc).length;
      const cntAfter  = cntBefore - 1;
      impacts.push({ loc:fromLoc, shift:r.shift, before:cntBefore, after:cntAfter, cap:capBefore });
    }
    if (toLoc && r.action !== 'remove') {
      const newShift  = r.action === 'to_morning' ? 'morning' : 'evening';
      const capAfter  = getCap(toLoc, dayIdx, newShift);
      const cntBefore = COACHES.filter(c=>gs(c.id,dayIdx)[newShift]===toLoc).length;
      const cntAfter  = cntBefore + 1;
      impacts.push({ loc:toLoc, shift:newShift, before:cntBefore, after:cntAfter, cap:capAfter });
    }

    const impactHTML = impacts.map(im => {
      const diff     = im.after - im.before;
      const gapAfter = im.after < im.cap;
      const overAfter= im.after > im.cap;
      const arrow    = diff > 0 ? `<span style="color:#16a34a">+1</span>` : `<span style="color:#dc2626">-1</span>`;
      const warn     = gapAfter ? ` <span style="color:#dc2626;font-size:10px">⚠ gap</span>` : overAfter ? ` <span style="color:#dc2626;font-size:10px">⚠ over</span>` : ` <span style="color:#16a34a;font-size:10px">✓</span>`;
      const sLabel   = im.shift === 'morning' ? 'AM' : 'PM';
      return `<div style="font-size:12px;margin-top:3px">${LOCS[im.loc].name} ${sLabel}: ${im.before}→${im.after}/${im.cap} ${arrow}${warn}</div>`;
    }).join('');

    return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:13px;font-weight:700">${DAYS[dayIdx]}</div>
      ${impactHTML || '<div style="font-size:12px;color:var(--muted)">No scheduled shift on this day.</div>'}
    </div>`;
  }).join('');

  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="bgClose(event)">
      <div class="modal">
        <div class="mhead">
          <div class="mhead-title">Preview: ${coach.name}</div>
          <div class="mhead-sub">${reqSummary(r)}</div>
        </div>
        <div class="mbody">${rows}</div>
        <div class="mfoot">
          <div></div>
          <div class="mfoot-right">
            <button class="btn btn-ghost" onclick="closeModal()">Close</button>
            <button class="btn btn-primary" onclick="closeModal();applyReq(${id})">Apply Change</button>
          </div>
        </div>
      </div>
    </div>`;
}

function applyReq(id) {
  if (isReadOnly()) { alert('Cannot apply to the current (read-only) schedule. Switch to a draft.'); return; }
  const r = requests.find(r=>r.id===id);
  if (r.action === 'move_day') return applyMoveDay(r);
  r.days.forEach(dayIdx => {
    const cur     = { ...gs(r.coachId, dayIdx) };
    const newShift = r.action==='to_morning' ? 'morning' : r.action==='to_evening' ? 'evening' : null;
    if (r.action === 'remove') {
      cur[r.shift] = null;
    } else {
      cur[r.shift] = null;       // remove old
      cur[newShift] = r.loc;     // add new
    }
    ss(r.coachId, dayIdx, cur);
  });
  r.status = 'done';
  saveReqs(); updateReqBadge(); render();
}

// ── MOVE_DAY: preview + apply ─────────────────────────────────────────────────
function moveDayCandidates(r) {
  // Candidate target days = explicit toDays OR all 7 days; exclude the source day.
  const fromDay = r.days[0];
  const candidates = (r.toDays && r.toDays.length) ? r.toDays : DAYS.map((_, i) => i);
  return candidates.filter(d => d !== fromDay);
}

function previewMoveDay(r) {
  const coach   = COACHES.find(c=>c.id===r.coachId);
  const fromDay = r.days[0];
  const cur     = gs(r.coachId, fromDay);
  const fromLoc = cur[r.shift];
  const targets = moveDayCandidates(r);

  // Source impact (always)
  let html = `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
    <div style="font-size:13px;font-weight:700">From: ${DAYS[fromDay]} ${r.shift === 'morning' ? 'Morning' : 'Evening'}</div>`;
  if (fromLoc) {
    const cap = getCap(fromLoc, fromDay, r.shift);
    const cnt = COACHES.filter(c=>gs(c.id,fromDay)[r.shift]===fromLoc).length;
    html += `<div style="font-size:12px;margin-top:3px">${LOCS[fromLoc].name} ${r.shift==='morning'?'AM':'PM'}: ${cnt}→${cnt-1}/${cap} <span style="color:#dc2626">-1</span></div>`;
  } else {
    html += `<div style="font-size:12px;color:var(--muted);margin-top:3px">No existing shift on this day. Cannot move.</div>`;
  }
  html += `</div>`;

  // Per-candidate target impact
  html += `<div style="padding:10px 0">
    <div style="font-size:13px;font-weight:700;margin-bottom:8px">To (${targets.length} candidate${targets.length===1?'':'s'}):</div>`;

  targets.forEach(toDay => {
    const tLoc = r.loc || coach.locs[0];
    const cap = getCap(tLoc, toDay, r.toShift);
    const cnt = COACHES.filter(c=>gs(c.id,toDay)[r.toShift]===tLoc).length;
    const conflict = gs(r.coachId, toDay)[r.toShift];
    const after = cnt + 1;
    const over  = after > cap;
    const note = conflict
      ? ` <span style="color:#dc2626;font-size:10px">⚠ coach already has shift</span>`
      : over ? ` <span style="color:#dc2626;font-size:10px">⚠ over</span>`
      : ` <span style="color:#16a34a;font-size:10px">✓</span>`;
    html += `<div style="font-size:12px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">
      <span><strong>${DAYS[toDay]}</strong> · ${LOCS[tLoc].name} ${r.toShift==='morning'?'AM':'PM'}: ${cnt}→${after}/${cap} <span style="color:#16a34a">+1</span>${note}</span>
      ${(fromLoc && !conflict) ? `<button class="req-btn approve" onclick="closeModal();applyMoveDayTo(${r.id},${toDay})" style="padding:3px 10px">Apply to ${DAYS[toDay].slice(0,3)}</button>` : ''}
    </div>`;
  });
  html += `</div>`;

  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="bgClose(event)">
      <div class="modal" style="width:520px">
        <div class="mhead">
          <div class="mhead-title">Preview move: ${coach.name}</div>
          <div class="mhead-sub">${reqSummary(r)}</div>
        </div>
        <div class="mbody">${html}</div>
        <div class="mfoot">
          <div></div>
          <div class="mfoot-right">
            <button class="btn btn-ghost" onclick="closeModal()">Close</button>
          </div>
        </div>
      </div>
    </div>`;
}

function applyMoveDay(r) {
  // If there's exactly one candidate, apply directly. Otherwise open the preview modal so admin picks.
  const targets = moveDayCandidates(r);
  if (targets.length === 1) return applyMoveDayTo(r.id, targets[0]);
  previewMoveDay(r);
}

function applyMoveDayTo(reqId, toDay) {
  if (isReadOnly()) { alert('Cannot apply to the current (read-only) schedule. Switch to a draft.'); return; }
  const r = requests.find(r=>r.id===reqId);
  if (!r) return;
  const fromDay = r.days[0];
  const fromCur = { ...gs(r.coachId, fromDay) };
  const loc = fromCur[r.shift] || r.loc;
  fromCur[r.shift] = null;
  ss(r.coachId, fromDay, fromCur);

  const toCur = { ...gs(r.coachId, toDay) };
  toCur[r.toShift] = loc;
  ss(r.coachId, toDay, toCur);

  r.status = 'done';
  saveReqs(); updateReqBadge(); render();
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(coachId, dayIdx) {
  if (isReadOnly()) { alert('Current schedule is read-only. Switch to a draft to edit.'); return; }
  const coach = COACHES.find(c => c.id === coachId);
  if (!coach.locs.length) return; // N/A coaches can't be scheduled
  const { morning, evening } = gs(coachId, dayIdx);
  ms = {
    coachId, dayIdx,
    m_on:  !!morning,  m_loc: morning || coach.locs[0],
    e_on:  !!evening,  e_loc: evening || coach.locs[0],
  };
  renderModal();
}

function renderModal() {
  const coach  = COACHES.find(c => c.id === ms.coachId);
  const hasAny = ms.m_on || ms.e_on;

  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="bgClose(event)">
      <div class="modal">
        <div class="mhead">
          <div class="mhead-title">${coach.name}</div>
          <div class="mhead-sub">${DAYS[ms.dayIdx]}</div>
        </div>
        <div class="mbody">
          ${sblock('morning','Morning','7:00 am \u2013 2:00 pm', ms.m_on, ms.m_loc, coach.locs)}
          ${sblock('evening','Evening','3:00 pm \u2013 10:00 pm', ms.e_on, ms.e_loc, coach.locs)}
        </div>
        <div class="mfoot">
          <div>${hasAny ? `<button class="btn btn-red" onclick="clearDay()">Clear</button>` : ''}</div>
          <div class="mfoot-right">
            <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveModal()">Save</button>
          </div>
        </div>
      </div>
    </div>`;
}

function sblock(shift, label, time, isOn, selLoc, coachLocs) {
  const s      = shift === 'morning' ? 'm' : 'e';
  const onKey  = shift === 'morning' ? 'm_on'  : 'e_on';
  const locKey = shift === 'morning' ? 'm_loc' : 'e_loc';
  return `<div class="sblock">
    <div class="sblock-head ${s}" onclick="toggle('${onKey}')">
      <div>
        <div class="sblock-title ${s}">${label}</div>
        <div class="sblock-time">${time}</div>
      </div>
      <button class="toggle ${isOn ? 'on' : ''}"
        onclick="event.stopPropagation();toggle('${onKey}')"></button>
    </div>
    ${isOn ? `<div class="loc-opts">
      ${Object.entries(LOCS).map(([lk, ld]) => {
        const avail = coachLocs.includes(lk);
        return `<button class="loc-opt ${lk} ${selLoc === lk ? 'sel' : ''}"
          ${!avail ? 'disabled' : ''}
          onclick="setLoc('${locKey}','${lk}')">${ld.name}</button>`;
      }).join('')}
    </div>` : ''}
  </div>`;
}

function toggle(key)      { ms[key] = !ms[key]; renderModal(); }
function setLoc(key, loc) { ms[key] = loc; renderModal(); }

function saveModal() {
  ss(ms.coachId, ms.dayIdx, {
    morning: ms.m_on ? ms.m_loc : null,
    evening: ms.e_on ? ms.e_loc : null,
  });
  closeModal();
  render();
}
function clearDay() {
  ss(ms.coachId, ms.dayIdx, { morning: null, evening: null });
  closeModal();
  render();
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; ms = null; }
function bgClose(e)   { if (e.target.classList.contains('overlay')) closeModal(); }

// ── TABS ──────────────────────────────────────────────────────────────────────
function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  ['overview', 'location', 'coach', 'requests', 'config', 'master', 'totals'].forEach(t => {
    const el = document.getElementById(`pane-${t}`);
    if (el) el.classList.toggle('hidden', t !== tab);
  });
  if (tab === 'master') {
    if (window.MS) window.MS.open();
    else { const p = document.getElementById('pane-master'); if (p) p.innerHTML = '<div style="padding:20px;color:#b00020;font-family:monospace">Master Schedule module did not initialize. Open the browser console (F12) for errors.</div>'; }
  } else if (tab === 'totals') {
    if (window.TOT) window.TOT.open();
    else { const p = document.getElementById('pane-totals'); if (p) p.innerHTML = '<div style="padding:20px;color:#b00020;font-family:monospace">Totals module did not initialize. Open the browser console (F12) for errors.</div>'; }
  } else {
    render();
  }
}

// ── IMPORT FROM LOCALSTORAGE (one-time migration) ─────────────────────────────
async function importLocalStorage() {
  const map = {
    coach_template_v1: 'current_schedule',
    coach_drafts_v1:   'drafts',
    coach_locks_v1:    'locks',
    coach_requests_v1: 'requests',
  };
  let pushed = 0;
  for (const [localKey, remoteKey] of Object.entries(map)) {
    const v = localStorage.getItem(localKey);
    if (v == null) continue;
    try { JSON.parse(v); } catch { continue; }
    const r = await fetch('/api/state/' + remoteKey, {
      method: 'PUT',
      headers: { 'content-type': 'application/json' },
      body: v,
    });
    if (r.ok) pushed++;
  }
  alert(`Imported ${pushed} keys to the cloud database. Reloading…`);
  location.reload();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async function init() {
  const root = document.getElementById('main');
  root.innerHTML = '<div style="padding:48px;text-align:center;color:#64748b">Loading…</div>';
  try {
    await kv.bootstrap();
  } catch (e) {
    root.innerHTML = `<div style="padding:48px;text-align:center;color:#dc2626">
      Failed to load from server: ${e.message}<br>
      <button class="scope-btn" style="margin-top:12px" onclick="location.reload()">Retry</button>
    </div>`;
    return;
  }

  // Restore the loading panes
  root.innerHTML = `
    <div id="pane-overview"></div>
    <div id="pane-location" class="hidden"></div>
    <div id="pane-coach"     class="hidden"></div>
    <div id="pane-requests"  class="hidden"></div>
    <div id="pane-config"    class="hidden"></div>
  `;

  hydrateConfig();

  // Show import banner if cloud is empty but localStorage has data
  if (kv.isRemoteEmpty() && localStorage.getItem('coach_template_v1')) {
    document.getElementById('import-banner').classList.remove('hidden');
  }

  loadSched();
  loadLocks();
  loadReqs();
  updateReqBadge();
  updateSyncIndicator();
  render();

  // Best-effort flush before the tab closes
  window.addEventListener('beforeunload', () => { kv.flushAll(); });
})();

// ════════════════════════════════════════════════════════════════════════════
// Master Schedule module — exposes window.MS = { open() }.
// ════════════════════════════════════════════════════════════════════════════
(function(){
  const FACILITIES = [
    { id:'satc',  name:'SATC',  key:'master_satc'  },
    { id:'pharr', name:'Pharr', key:'master_pharr' },
    { id:'wilco', name:'Wilco', key:'master_wilco' },
  ];
  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const COURT_LABELS = ['1','2','3','4','5','W'];
  const COURT_COUNT = COURT_LABELS.length;
  const SLOT_MIN = 30, START_HOUR = 6, END_HOUR = 22;
  const SLOTS_PER_HOUR = 60 / SLOT_MIN;
  const TOTAL_SLOTS = (END_HOUR - START_HOUR) * SLOTS_PER_HOUR;
  const SLOT_PX = 36;
  const FIRST_EVENING_SLOT = 18;
  const MORNING_RANGE = { label:'6a-2p' };
  const EVENING_RANGE = { label:'3p-10p' };
  const COLORS = ['#2596b5','#1b4458','#95d600','#7c4dff','#f57c00','#c2185b','#00897b','#5d4037'];
  const ADULT_LEVELS = ['Beginner','Advanced Beginner','2.0-2.5','2.5-3.0','3.0','3.0-3.5','3.5','3.5-4.0','4.0','4.0-4.5','4.5','4.5-5.0','Serving Clinic','Private'];
  const JUNIOR_AGES = ['3-4','5-8','9-11','12-15'];
  const JUNIOR_SKILLS = ['Beginner','Intermediate','Advanced'];
  function juniorSkillsFor(age){ return age==='3-4' ? ['Beginner'] : JUNIOR_SKILLS; }
  function composeLevel(cat,al,ja,js){
    if (cat==='adult') return al || '';
    if (cat==='junior') return 'Jr ' + ja + ' . ' + js;
    return '';
  }

  let activeFacility = 'satc', activeDay = 0;
  let msState = { satc:{blocks:[]}, pharr:{blocks:[]}, wilco:{blocks:[]} };
  let pools = { satc:{}, pharr:{}, wilco:{} };
  let editingId = null;
  let selectedCourts = [1];
  let saveTimers = {};
  let drag = null;
  let initialized = false;

  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function slotToTime(s){ const m = START_HOUR*60 + s*SLOT_MIN; return pad(Math.floor(m/60))+':'+pad(m%60); }
  function timeToSlot(t){ const a = t.split(':').map(Number); return (a[0]-START_HOUR)*SLOTS_PER_HOUR + a[1]/SLOT_MIN; }
  function fmt12(t){ const a = t.split(':').map(Number); const h=a[0], m=a[1]; const p=h>=12?'p':'a'; const hh=((h+11)%12)+1; return m===0?(hh+p):(hh+':'+pad(m)+p); }
  function uid(){ return Math.random().toString(36).slice(2,9); }
  function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
  function slotToY(s){ return s * SLOT_PX; }
  function yToSlotF(y){ return y / SLOT_PX; }

  async function bootstrapMS(){
    try {
      const data = await fetch('/api/state').then(function(r){ return r.json(); });
      for (let i = 0; i < FACILITIES.length; i++) {
        const f = FACILITIES[i];
        const v = data[f.key];
        msState[f.id] = (v && typeof v==='object' && Array.isArray(v.blocks)) ? v : {blocks:[]};
        if (!msState[f.id].roster) msState[f.id].roster = {};
      }
    } catch(e){ console.error('[MS] state fetch', e); }
    try {
      const r = await fetch('/api/pool');
      if (r.ok) pools = await r.json();
    } catch(e){ console.error('[MS] pool fetch', e); }
  }
  function persist(facId){
    clearTimeout(saveTimers[facId]);
    saveTimers[facId] = setTimeout(async function(){
      const key = FACILITIES.find(function(f){ return f.id===facId; }).key;
      try { await fetch('/api/state/'+key, { method:'PUT', headers:{'content-type':'application/json'}, body: JSON.stringify(msState[facId]) }); } catch(e){}
    }, 300);
  }

  function getRosterDay(){
    const fac = msState[activeFacility];
    if (!fac.roster) fac.roster = {};
    let r = fac.roster[activeDay];
    if (!r || !Array.isArray(r.morning) || !Array.isArray(r.evening)){
      r = { morning: Array(COURT_COUNT).fill(''), evening: Array(COURT_COUNT).fill('') };
      fac.roster[activeDay] = r;
    }
    while (r.morning.length < COURT_COUNT) r.morning.push('');
    while (r.evening.length < COURT_COUNT) r.evening.push('');
    return r;
  }

  function ensurePane(){
    let el = document.getElementById('pane-master');
    if (!el) {
      const main = document.getElementById('main') || document.body;
      el = document.createElement('div');
      el.id = 'pane-master';
      main.appendChild(el);
      // start hidden; setTab will reveal it if active
      el.classList.add('hidden');
    }
    return el;
  }
  function buildPane(){
    const el = ensurePane();
    el.innerHTML =
      '<div class="ms-bar" id="ms-facility-tabs"></div>' +
      '<div class="ms-daybar" id="ms-day-tabs"></div>' +
      '<div class="ms-toolbar">' +
        '<button class="ms-btn primary" id="ms-add-btn">+ Add class</button>' +
        '<button class="ms-btn" id="ms-export-btn">Export JSON</button>' +
        '<span class="ms-legend">' +
          '<span><span class="ms-sample reg"></span>Adult</span>' +
          '<span><span class="ms-sample jr"></span>Junior</span>' +
          '<span><span class="ms-sample priv"></span>Private</span>' +
          '<span><span class="ms-sample sem"></span>Semester</span>' +
          '<span><span class="ms-sample band"></span>Summer camp band (Mon-Thu 9:30-12:30)</span>' +
        '</span>' +
      '</div>' +
      '<div class="ms-pool" id="ms-pool"></div>' +
      '<div><div class="ms-grid" id="ms-grid"></div></div>' +
      '<div class="ms-overlay" id="ms-overlay">' +
        '<div class="ms-modal">' +
          '<h2 id="ms-modal-title">Add class</h2>' +
          '<label class="ms-field">Category<select id="ms-f-category"><option value="adult">Adult</option><option value="junior">Junior</option></select></label>' +
          '<div class="ms-row" id="ms-adult-row"><label class="ms-field" style="flex:1;">Adult level<select id="ms-f-adult-level"></select></label></div>' +
          '<div class="ms-row" id="ms-junior-row" style="display:none;">' +
            '<label class="ms-field">Age group<select id="ms-f-junior-age"></select></label>' +
            '<label class="ms-field">Skill<select id="ms-f-junior-skill"></select></label>' +
          '</div>' +
          '<div class="ms-row">' +
            '<label class="ms-field">Day<select id="ms-f-day"></select></label>' +
            '<label class="ms-field">Start<select id="ms-f-start"></select></label>' +
            '<label class="ms-field">End<select id="ms-f-end"></select></label>' +
          '</div>' +
          '<label class="ms-field" style="margin-bottom:10px;">Courts<div id="ms-f-courts" class="ms-court-chips"></div></label>' +
          '<label class="ms-field">Notes<textarea id="ms-f-notes" rows="2"></textarea></label>' +
          '<div class="ms-row" style="align-items:flex-end;">' +
            '<label class="ms-check"><input id="ms-f-semester" type="checkbox"> Semester class</label>' +
          '</div>' +
          '<div class="ms-actions">' +
            '<button class="ms-btn danger" id="ms-delete-btn" style="margin-right:auto; display:none;">Delete</button>' +
            '<button class="ms-btn" id="ms-cancel-btn">Cancel</button>' +
            '<button class="ms-btn primary" id="ms-save-btn">Save</button>' +
          '</div>' +
        '</div>' +
      '</div>';

    document.getElementById('ms-f-day').innerHTML = DAYS.map(function(d,i){ return '<option value="'+i+'">'+d+'</option>'; }).join('');
    let topts = '';
    for (let s = 0; s <= TOTAL_SLOTS; s++){ const t = slotToTime(s); topts += '<option value="'+t+'">'+fmt12(t)+' ('+t+')</option>'; }
    document.getElementById('ms-f-start').innerHTML = topts;
    document.getElementById('ms-f-end').innerHTML = topts;
    document.getElementById('ms-f-adult-level').innerHTML = ADULT_LEVELS.map(function(l){ return '<option value="'+l+'">'+l+'</option>'; }).join('');
    document.getElementById('ms-f-junior-age').innerHTML = JUNIOR_AGES.map(function(a){ return '<option value="'+a+'">'+a+'</option>'; }).join('');
    refreshJuniorSkills();

    document.getElementById('ms-add-btn').onclick = function(){ openCreate(activeDay,'09:00','10:00',1); };
    document.getElementById('ms-cancel-btn').onclick = closeModal;
    document.getElementById('ms-save-btn').onclick = saveModal;
    document.getElementById('ms-delete-btn').onclick = deleteBlock;
    document.getElementById('ms-overlay').onclick = function(e){ if (e.target.id==='ms-overlay') closeModal(); };
    document.getElementById('ms-export-btn').onclick = function(){
      const blob = new Blob([JSON.stringify(msState,null,2)], {type:'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'master-schedule.json'; a.click();
    };
    document.getElementById('ms-f-category').addEventListener('change', function(e){ setCategoryUI(e.target.value); });
    document.getElementById('ms-f-junior-age').addEventListener('change', refreshJuniorSkills);
    document.addEventListener('keydown', function(e){
      const ov = document.getElementById('ms-overlay');
      if (e.key==='Escape' && ov && ov.classList.contains('open')) closeModal();
    });
  }

  function refreshJuniorSkills(){
    const ageEl = document.getElementById('ms-f-junior-age'); if (!ageEl) return;
    const age = ageEl.value;
    const skillEl = document.getElementById('ms-f-junior-skill'); if (!skillEl) return;
    const prev = skillEl.value;
    const opts = juniorSkillsFor(age);
    skillEl.innerHTML = opts.map(function(s){ return '<option value="'+s+'">'+s+'</option>'; }).join('');
    if (opts.indexOf(prev) !== -1) skillEl.value = prev;
  }
  function setCategoryUI(cat){
    document.getElementById('ms-f-category').value = cat;
    document.getElementById('ms-adult-row').style.display  = cat==='adult'  ? '' : 'none';
    document.getElementById('ms-junior-row').style.display = cat==='junior' ? '' : 'none';
  }

  function renderTabs(){
    const el = document.getElementById('ms-facility-tabs');
    el.innerHTML = FACILITIES.map(function(f){ return '<button class="ms-tab '+(f.id===activeFacility?'active':'')+'" data-fac="'+f.id+'">'+f.name+'</button>'; }).join('');
    el.querySelectorAll('.ms-tab').forEach(function(b){ b.onclick = function(){ activeFacility = b.dataset.fac; renderTabs(); renderPool(); renderGrid(); }; });
  }
  function renderDayTabs(){
    const el = document.getElementById('ms-day-tabs');
    el.innerHTML = DAYS.map(function(d,i){ return '<button class="ms-daytab '+(i===activeDay?'active':'')+'" data-day="'+i+'">'+d+'</button>'; }).join('');
    el.querySelectorAll('.ms-daytab').forEach(function(b){ b.onclick = function(){ activeDay = +b.dataset.day; renderDayTabs(); renderPool(); renderGrid(); }; });
  }

  function morningCoachRowHTML(){
    const r = getRosterDay();
    let h = '<div class="ms-ghc label morning">Morning . '+MORNING_RANGE.label+'</div>';
    for (let c = 0; c < COURT_COUNT; c++){
      h += '<div class="ms-ghc"><input data-shift="morning" data-court="'+c+'" placeholder="Coach" value="'+esc(r.morning[c]||'')+'"></div>';
    }
    return h;
  }
  function eveningCoachRowHTML(){
    const r = getRosterDay();
    let h = '<div class="ms-ghc label evening">Evening . '+EVENING_RANGE.label+'</div>';
    for (let c = 0; c < COURT_COUNT; c++){
      h += '<div class="ms-ghc"><input data-shift="evening" data-court="'+c+'" placeholder="Coach" value="'+esc(r.evening[c]||'')+'"></div>';
    }
    return h;
  }

  function renderPool(){
    const el = document.getElementById('ms-pool');
    const p = (pools[activeFacility]||{})[activeDay] || { morning:[], evening:[] };
    const r = getRosterDay();
    const assigned = new Set();
    [].concat(r.morning, r.evening).forEach(function(s){ if (s) s.split(/,\s*/).forEach(function(n){ assigned.add(n); }); });
    function chips(list, shift){
      if (!list.length) return '<span class="ms-pool-empty">No coaches on this shift</span>';
      return list.map(function(n){ return '<span class="ms-chip '+(assigned.has(n)?'assigned':'')+'" draggable="true" data-shift="'+shift+'" data-name="'+esc(n)+'">'+esc(n)+'</span>'; }).join('');
    }
    el.innerHTML =
      '<div class="ms-pool-row"><span class="ms-pool-label morning">Available morning</span>'+chips(p.morning,'morning')+'</div>' +
      '<div class="ms-pool-row"><span class="ms-pool-label evening">Available evening</span>'+chips(p.evening,'evening')+'</div>';
    el.querySelectorAll('.ms-chip').forEach(function(chip){
      chip.addEventListener('dragstart', function(e){
        e.dataTransfer.setData('text/coach-name', chip.dataset.name);
        e.dataTransfer.setData('text/coach-shift', chip.dataset.shift);
        e.dataTransfer.effectAllowed = 'copy';
      });
    });
  }

  function wireCoachInputs(g){
    g.querySelectorAll('.ms-ghc input').forEach(function(inp){
      inp.addEventListener('change', function(){
        const r = getRosterDay();
        r[inp.dataset.shift][+inp.dataset.court] = inp.value.trim();
        persist(activeFacility); renderPool();
      });
    });
    g.querySelectorAll('.ms-ghc').forEach(function(cell){
      const inp = cell.querySelector('input'); if (!inp) return;
      cell.addEventListener('dragover', function(e){
        if (!Array.from(e.dataTransfer.types).indexOf('text/coach-shift') === -1) return;
        e.preventDefault(); e.dataTransfer.dropEffect = 'copy';
        cell.classList.add('drop-target');
      });
      cell.addEventListener('dragleave', function(){ cell.classList.remove('drop-target'); });
      cell.addEventListener('drop', function(e){
        e.preventDefault(); cell.classList.remove('drop-target');
        const name = e.dataTransfer.getData('text/coach-name'); if (!name) return;
        const existing = inp.value.trim();
        if (!existing) inp.value = name;
        else if (existing.split(/,\s*/).indexOf(name) === -1) inp.value = existing + ', ' + name;
        const r = getRosterDay();
        r[inp.dataset.shift][+inp.dataset.court] = inp.value.trim();
        persist(activeFacility); renderPool();
      });
    });
  }

  function blockCat(b){ return b.category || (b.juniorAge ? 'junior' : 'adult'); }
  function renderGrid(){
    const g = document.getElementById('ms-grid');
    // Junior duplicate check: same level + same day + same facility.
    const jrLevelCount = {};
    (msState[activeFacility].blocks||[]).forEach(function(b){
      if (b.day===activeDay && blockCat(b)==='junior'){ const lv=b.level||''; jrLevelCount[lv]=(jrLevelCount[lv]||0)+1; }
    });
    const dupGroupKey = {}; // level -> "A","B",...
    let dupIdx = 0;
    Object.keys(jrLevelCount).forEach(function(lv){
      if (jrLevelCount[lv] > 1) { dupGroupKey[lv] = dupIdx < 26 ? String.fromCharCode(65+dupIdx) : '*'; dupIdx++; }
    });
    function dupKeyFor(b){ return (blockCat(b)==='junior') ? (dupGroupKey[b.level||''] || '') : ''; }
    let html = '<div class="ms-gh">Time</div>';
    for (let i = 0; i < COURT_LABELS.length; i++){
      const lbl = COURT_LABELS[i];
      html += '<div class="ms-gh">'+(lbl==='W'?'Wall':'Court '+lbl)+'</div>';
    }
    html += morningCoachRowHTML();
    html += '<div class="ms-tcol">';
    for (let s = 0; s < TOTAL_SLOTS; s++){
      const t = slotToTime(s); const isHour = t.indexOf(':00') !== -1 && t.endsWith(':00');
      const isEve = (s === FIRST_EVENING_SLOT);
      html += '<div class="ms-tlabel '+(isHour?'hour':'')+'"'+(isEve?' style="color:#2596b5;font-weight:700;"':'')+'>'+(isHour?fmt12(t):'')+'</div>';
    }
    html += '</div>';
    for (let c = 1; c <= COURT_COUNT; c++){
      html += '<div class="ms-ccol" data-court="'+c+'">';
      for (let s = 0; s < TOTAL_SLOTS; s++){
        const t = slotToTime(s); const isHour = t.endsWith(':00');
        html += '<div class="ms-slot '+(isHour?'hour':'half')+'" data-slot="'+s+'"></div>';
      }
      if (activeDay <= 3) {
        const top = slotToY(timeToSlot('09:30'));
        const height = slotToY(timeToSlot('12:30')) - top;
        const lbl = c===1 ? '<span class="ms-camp-lbl">SUMMER CAMP ZONE</span>' : '';
        html += '<div class="ms-camp" style="top:'+top+'px;height:'+height+'px;">'+lbl+'</div>';
      }
      const blocks = (msState[activeFacility].blocks||[]).filter(function(b){ return b.day===activeDay && Array.isArray(b.courts) && b.courts.indexOf(c) !== -1; });
      for (let bi = 0; bi < blocks.length; bi++){
        const b = blocks[bi];
        const ss = timeToSlot(b.start), es = timeToSlot(b.end);
        const top = slotToY(ss), height = slotToY(es) - top - 2;
        const semCls = b.semester ? 'semester' : '';
        const semBadge = b.semester ? '<span class="ms-sembadge">SEM</span>' : '';
        const noteFlag = b.notes ? '<span class="ms-bnoteflag" title="'+esc(b.notes)+'">&#9998;</span>' : '';
        const ct = b.courts.length > 1 ? ' . Cts ' + b.courts.map(function(x){ return COURT_LABELS[x-1]; }).join(',') : '';
        const noteHtml = b.notes ? '<div class="ms-bnote">'+esc(b.notes)+'</div>' : '';
        const dKey = dupKeyFor(b);
        const dup = !!dKey;
        const dupWarn = dup ? 'Pair '+dKey+': another &quot;'+esc(b.level||'')+'&quot; junior class on this day at this facility' : '';
        const titleParts = [b.notes ? esc(b.notes) : '', dupWarn].filter(Boolean);
        const titleAttr = titleParts.length ? ' title="'+titleParts.join(' — ')+'"' : '';
        const dupBadge = dup ? '<span class="ms-dupbadge" title="'+dupWarn+'">&#9888; '+dKey+'</span>' : '';
        const dupAttr = dup ? ' data-dupkey="'+dKey+'"' : '';
        html += '<div class="ms-block '+semCls+(dup?' ms-dup':'')+'" data-id="'+b.id+'"'+dupAttr+titleAttr+' style="top:'+top+'px;height:'+height+'px;background:'+blockColor(b)+';"><div class="ms-badges">'+semBadge+dupBadge+noteFlag+'</div><div class="ms-btitle">'+esc(b.level||'(no level)')+'</div><div class="ms-bmeta">'+fmt12(b.start)+'-'+fmt12(b.end)+ct+'</div>'+noteHtml+'<div class="ms-resize"></div></div>';
      }
      html += '</div>';
    }
    html += eveningCoachRowHTML();
    g.innerHTML = html;
    wireCoachInputs(g);
    g.querySelectorAll('.ms-ccol').forEach(function(col){
      col.addEventListener('mousedown', onColMouseDown);
    });
    wireBlocks(g);
    // Hover a duplicate junior block -> highlight its partner(s).
    g.querySelectorAll('.ms-block[data-dupkey]').forEach(function(el){
      el.addEventListener('mouseenter', function(){
        const k = el.dataset.dupkey;
        g.querySelectorAll('.ms-block[data-dupkey="'+k+'"]').forEach(function(p){ p.classList.add('peer-hover'); });
      });
      el.addEventListener('mouseleave', function(){
        g.querySelectorAll('.ms-block.peer-hover').forEach(function(p){ p.classList.remove('peer-hover'); });
      });
    });
  }

  function wireBlocks(g){
    g.querySelectorAll('.ms-block').forEach(function(el){
      el.addEventListener('mousedown', function(e){
        if (e.button !== 0) return;
        e.stopPropagation();
        const id = el.dataset.id;
        const b = msState[activeFacility].blocks.find(function(x){ return x.id===id; });
        if (!b) return;
        const isResize = !!(e.target.closest && e.target.closest('.ms-resize'));
        const s0 = timeToSlot(b.start), e0 = timeToSlot(b.end);
        const dur = e0 - s0;
        const startY = e.clientY;
        const meta = el.querySelector('.ms-bmeta');
        const ctTxt = (b.courts && b.courts.length > 1) ? ' . Cts ' + b.courts.map(function(x){ return COURT_LABELS[x-1]; }).join(',') : '';
        let moved = false, cur = { start:s0, end:e0 };
        function paint(){
          const top = slotToY(cur.start), height = slotToY(cur.end) - top - 2;
          el.style.top = top + 'px'; el.style.height = height + 'px';
          if (meta) meta.textContent = fmt12(slotToTime(cur.start)) + '-' + fmt12(slotToTime(cur.end)) + ctTxt;
        }
        function onMove(ev){
          const dy = ev.clientY - startY;
          if (Math.abs(dy) > 3) moved = true;
          if (isResize){
            let ne = Math.round(yToSlotF(slotToY(e0) + dy));
            ne = Math.max(s0 + 1, Math.min(TOTAL_SLOTS, ne));
            cur = { start:s0, end:ne };
          } else {
            let ns = Math.round(yToSlotF(slotToY(s0) + dy));
            ns = Math.max(0, Math.min(TOTAL_SLOTS - dur, ns));
            cur = { start:ns, end:ns + dur };
          }
          paint();
        }
        function onUp(){
          window.removeEventListener('mousemove', onMove);
          document.body.style.cursor = '';
          el.classList.remove('dragging');
          if (!moved){ if (!isResize) openEdit(id); return; }
          if (cur.start===s0 && cur.end===e0){ renderGrid(); return; }
          b.start = slotToTime(cur.start);
          b.end = slotToTime(cur.end);
          persist(activeFacility);
          renderGrid();
        }
        el.classList.add('dragging');
        document.body.style.cursor = isResize ? 'ns-resize' : 'grabbing';
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp, { once:true });
        e.preventDefault();
      });
    });
  }

  function slotFromEvent(colEl, e){
    const rect = colEl.getBoundingClientRect();
    const y = e.clientY - rect.top;
    return Math.max(0, Math.min(TOTAL_SLOTS - 1, Math.floor(y / SLOT_PX)));
  }
  function onColClick(e){ const b = e.target.closest('.ms-block'); if (b) openEdit(b.dataset.id); }
  function onColMouseDown(e){
    if (e.button !== 0) return;
    if (e.target.closest('.ms-block')) return;
    if (e.target.closest('.ms-ghc')) return;
    const colEl = e.currentTarget;
    const court = +colEl.dataset.court;
    const startSlot = slotFromEvent(colEl, e);
    drag = { court: court, startSlot: startSlot, currentSlot: startSlot, colEl: colEl, previewEl: null };
    const preview = document.createElement('div');
    preview.className = 'ms-preview';
    colEl.appendChild(preview);
    drag.previewEl = preview;
    updateDragPreview();
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup',   onDragEnd, { once: true });
    e.preventDefault();
  }
  function onDragMove(e){ if (!drag) return; drag.currentSlot = slotFromEvent(drag.colEl, e); updateDragPreview(); }
  function updateDragPreview(){
    const a = Math.min(drag.startSlot, drag.currentSlot);
    const b = Math.max(drag.startSlot, drag.currentSlot) + 1;
    const top = slotToY(a), height = slotToY(b) - top - 2;
    drag.previewEl.style.top = top+'px';
    drag.previewEl.style.height = height+'px';
    drag.previewEl.textContent = fmt12(slotToTime(a)) + ' - ' + fmt12(slotToTime(b));
  }
  function onDragEnd(){
    window.removeEventListener('mousemove', onDragMove);
    if (!drag) return;
    const a = Math.min(drag.startSlot, drag.currentSlot);
    const b = Math.max(drag.startSlot, drag.currentSlot) + 1;
    const court = drag.court;
    drag.previewEl.remove(); drag = null;
    openCreate(activeDay, slotToTime(a), slotToTime(b), court);
  }

  function isPrivate(b){ return (b.adultLevel === 'Private') || (b.level === 'Private') || (typeof b.level === 'string' && /\bprivate\b/i.test(b.level)); }
  function blockColor(b){
    const cat = b.category || (b.juniorAge ? 'junior' : 'adult');
    if (cat === 'adult' && isPrivate(b)) return '#d4a017';
    return cat === 'junior' ? '#f57c00' : '#2596b5';
  }
  function refreshCourtChips(){
    const el = document.getElementById('ms-f-courts');
    el.innerHTML = COURT_LABELS.map(function(lbl,i){
      const n = i+1, on = selectedCourts.indexOf(n) !== -1;
      return '<div class="ms-court-chip '+(on?'on':'')+'" data-court="'+n+'">'+lbl+'</div>';
    }).join('');
    el.querySelectorAll('.ms-court-chip').forEach(function(b){
      b.onclick = function(){
        const n = +b.dataset.court;
        if (selectedCourts.indexOf(n) !== -1) selectedCourts = selectedCourts.filter(function(x){ return x!==n; });
        else selectedCourts.push(n);
        if (!selectedCourts.length) selectedCourts = [n];
        refreshCourtChips();
      };
    });
  }

  function openCreate(day, startTime, endTime, court){
    editingId = null;
    document.getElementById('ms-modal-title').textContent = 'Add class';
    document.getElementById('ms-delete-btn').style.display = 'none';
    document.getElementById('ms-f-notes').value = '';
    document.getElementById('ms-f-day').value = day;
    document.getElementById('ms-f-start').value = startTime;
    document.getElementById('ms-f-end').value = endTime;
    document.getElementById('ms-f-semester').checked = false;
    setCategoryUI('adult');
    document.getElementById('ms-f-adult-level').value = ADULT_LEVELS[0];
    document.getElementById('ms-f-junior-age').value = JUNIOR_AGES[1];
    refreshJuniorSkills();
    selectedCourts = [court || 1];
    refreshCourtChips();
    document.getElementById('ms-overlay').classList.add('open');
  }
  function openEdit(id){
    const b = msState[activeFacility].blocks.find(function(x){ return x.id===id; }); if (!b) return;
    editingId = id;
    document.getElementById('ms-modal-title').textContent = 'Edit class';
    document.getElementById('ms-delete-btn').style.display = '';
    document.getElementById('ms-f-notes').value = b.notes || '';
    document.getElementById('ms-f-day').value = b.day;
    document.getElementById('ms-f-start').value = b.start;
    document.getElementById('ms-f-end').value = b.end;
    document.getElementById('ms-f-semester').checked = !!b.semester;
    const cat = b.category || (b.juniorAge ? 'junior' : 'adult');
    setCategoryUI(cat);
    if (cat==='adult'){
      const lv = ADULT_LEVELS.indexOf(b.adultLevel) !== -1 ? b.adultLevel : (ADULT_LEVELS.indexOf(b.level) !== -1 ? b.level : ADULT_LEVELS[0]);
      document.getElementById('ms-f-adult-level').value = lv;
    } else {
      const ag = JUNIOR_AGES.indexOf(b.juniorAge) !== -1 ? b.juniorAge : JUNIOR_AGES[1];
      document.getElementById('ms-f-junior-age').value = ag;
      refreshJuniorSkills();
      const skills = juniorSkillsFor(ag);
      const sk = skills.indexOf(b.juniorSkill) !== -1 ? b.juniorSkill : skills[0];
      document.getElementById('ms-f-junior-skill').value = sk;
    }
    selectedCourts = (Array.isArray(b.courts) && b.courts.length) ? b.courts.slice() : [1];
    refreshCourtChips();
    document.getElementById('ms-overlay').classList.add('open');
  }
  function closeModal(){ const ov = document.getElementById('ms-overlay'); if (ov) ov.classList.remove('open'); editingId = null; }

  function saveModal(){
    const category = document.getElementById('ms-f-category').value;
    const adultLevel = document.getElementById('ms-f-adult-level').value;
    const juniorAge = document.getElementById('ms-f-junior-age').value;
    const juniorSkill = document.getElementById('ms-f-junior-skill').value;
    const level = composeLevel(category, adultLevel, juniorAge, juniorSkill);
    const day = +document.getElementById('ms-f-day').value;
    const start = document.getElementById('ms-f-start').value;
    const end = document.getElementById('ms-f-end').value;
    const notes = document.getElementById('ms-f-notes').value.trim();
    const semester = document.getElementById('ms-f-semester').checked;
    if (timeToSlot(end) <= timeToSlot(start)) { alert('End must be after start'); return; }
    const courts = selectedCourts.slice().sort(function(a,b){ return a-b; });
    const blocks = msState[activeFacility].blocks;
    if (category === 'junior'){
      const clash = blocks.some(function(x){
        if (editingId && x.id === editingId) return false;
        return blockCat(x)==='junior' && x.day===day && (x.level||'')===level;
      });
      if (clash){
        const facName = (FACILITIES.find(function(f){ return f.id===activeFacility; })||{name:activeFacility}).name;
        if (!confirm('⚠ There is already a "'+level+'" junior class on '+DAYS[day]+' at '+facName+'.\n\nAdd this one anyway?')) return;
      }
    }
    const extras = { category: category, adultLevel: category==='adult'?adultLevel:null, juniorAge: category==='junior'?juniorAge:null, juniorSkill: category==='junior'?juniorSkill:null };
    if (editingId){
      const b = blocks.find(function(x){ return x.id===editingId; });
      Object.assign(b, { level: level, day: day, start: start, end: end, notes: notes, semester: semester, color: blockColor(Object.assign({ category:category, level:level }, extras)), courts: courts }, extras);
    } else {
      const obj = Object.assign({ id: uid(), level: level, day: day, start: start, end: end, notes: notes, semester: semester, color: blockColor(Object.assign({ category:category, level:level }, extras)), courts: courts }, extras);
      blocks.push(obj);
    }
    if (day !== activeDay) activeDay = day;
    persist(activeFacility);
    closeModal();
    renderDayTabs(); renderGrid();
  }
  function deleteBlock(){
    if (!editingId) return;
    if (!confirm('Delete this class?')) return;
    msState[activeFacility].blocks = msState[activeFacility].blocks.filter(function(b){ return b.id !== editingId; });
    persist(activeFacility);
    closeModal();
    renderGrid();
  }

  async function safeRun(label, fn){
    try { await fn(); }
    catch(e){
      console.error('[Master Schedule] ' + label, e);
      const el = document.getElementById('pane-master');
      if (el) el.innerHTML = '<div style="padding:20px;color:#b00020;font-family:monospace;font-size:13px;"><b>Master Schedule error in ' + label + '</b><br><br>' + esc(e.message || String(e)) + '<br><br>Check console for full stack.</div>';
    }
  }

  console.log('[Master Schedule] module loaded');
  window.MS = {
    async open(){
      console.log('[Master Schedule] open(), initialized=', initialized);
      await safeRun('open', async function(){
        // Always rebuild the DOM scaffold (creates #pane-master if absent).
        // Cheap, idempotent, and avoids stale-cache mismatches.
        buildPane();
        if (!initialized){
          await bootstrapMS();
          initialized = true;
        } else {
          try { const r = await fetch('/api/pool'); if (r.ok) pools = await r.json(); } catch(e){}
        }
        // Reveal pane if scheduling's setTab missed it (e.g. element didn't exist yet).
        const p = document.getElementById('pane-master');
        if (p) p.classList.remove('hidden');
        renderTabs(); renderDayTabs(); renderPool(); renderGrid();
      });
    }
  };
})();
</script>

<script>
// ════════════════════════════════════════════════════════════════════════════
// Totals dashboard — exposes window.TOT = { open() }.
// Reads the master_* keys from D1 and aggregates per location, with filters.
// ════════════════════════════════════════════════════════════════════════════
(function(){
  const FACILITIES = [
    { id:'satc',  name:'SATC',  key:'master_satc',  color:'#1b4458' },
    { id:'pharr', name:'Pharr', key:'master_pharr', color:'#2596b5' },
    { id:'wilco', name:'Wilco', key:'master_wilco', color:'#7c4dff' },
  ];
  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const COURT_LABELS = ['1','2','3','4','5','W'];
  const COURT_COUNT = 6, OPEN_HOUR = 6, CLOSE_HOUR = 22;
  const WEEK_COURT_CAPACITY = COURT_COUNT * (CLOSE_HOUR - OPEN_HOUR) * 7; // court-hours/week

  let store = { satc:[], pharr:[], wilco:[] };
  let rosters = { satc:{}, pharr:{}, wilco:{} };
  let filters = { days:new Set([0,1,2,3,4,5,6]), cat:'all', loc:'all', sem:'all', shift:'all', q:'' };
  function facList(){ return filters.loc==='all' ? FACILITIES : FACILITIES.filter(function(f){ return f.id===filters.loc; }); }

  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
  function timeToMin(t){ const a=String(t||'0:0').split(':').map(Number); return (a[0]||0)*60+(a[1]||0); }
  function hoursOf(b){ return Math.max(0, (timeToMin(b.end)-timeToMin(b.start))/60); }
  function isMorning(b){ return timeToMin(b.start) < 14*60; }
  function catOf(b){ return b.category || (b.juniorAge ? 'junior' : 'adult'); }
  function r1(n){ return Math.round((n+Number.EPSILON)*10)/10; }
  function pct(a,b){ return b ? Math.round(a/b*100) : 0; }

  async function load(){
    try {
      const data = await fetch('/api/state', { cache:'no-store' }).then(function(r){ return r.json(); });
      FACILITIES.forEach(function(f){
        const v = data[f.key];
        store[f.id] = (v && Array.isArray(v.blocks)) ? v.blocks : [];
        rosters[f.id] = (v && v.roster && typeof v.roster==='object') ? v.roster : {};
      });
    } catch(e){ console.error('[Totals] load', e); }
  }

  function pass(b){
    if (!filters.days.has(b.day)) return false;
    if (filters.cat!=='all' && catOf(b)!==filters.cat) return false;
    if (filters.shift==='morning' && !isMorning(b)) return false;
    if (filters.shift==='evening' &&  isMorning(b)) return false;
    if (filters.sem==='sem' && !b.semester) return false;
    if (filters.sem==='reg' &&  b.semester) return false;
    if (filters.q){
      const hay = ((b.level||'')+' '+(b.notes||'')+' '+(b.adultLevel||'')+' '+(b.juniorAge||'')+' '+(b.juniorSkill||'')).toLowerCase();
      if (hay.indexOf(filters.q.toLowerCase())===-1) return false;
    }
    return true;
  }

  function coachesFor(facId){
    const set = new Set();
    const ros = rosters[facId] || {};
    Object.keys(ros).forEach(function(d){
      if (!filters.days.has(+d)) return;
      const r = ros[d] || {};
      ['morning','evening'].forEach(function(sh){
        if (filters.shift==='morning' && sh!=='morning') return;
        if (filters.shift==='evening' && sh!=='evening') return;
        (Array.isArray(r[sh]) ? r[sh] : []).forEach(function(cell){
          String(cell||'').split(/,\s*/).forEach(function(n){ n=n.trim(); if (n) set.add(n); });
        });
      });
    });
    return set;
  }

  function summarize(facId){
    const blocks = store[facId] || [];
    const s = { count:0, classHrs:0, courtHrs:0, adult:0, junior:0, sem:0, morning:0, evening:0,
                byDay:[0,0,0,0,0,0,0], byDayHrs:[0,0,0,0,0,0,0], byLevel:{}, courtUse:[0,0,0,0,0,0], coaches:0 };
    blocks.forEach(function(b){
      if (!pass(b)) return;
      const h = hoursOf(b);
      const courts = (Array.isArray(b.courts) && b.courts.length) ? b.courts : [1];
      s.count++; s.classHrs += h; s.courtHrs += h*courts.length;
      if (catOf(b)==='junior') s.junior++; else s.adult++;
      if (b.semester) s.sem++;
      if (isMorning(b)) s.morning++; else s.evening++;
      if (b.day>=0 && b.day<=6){ s.byDay[b.day]++; s.byDayHrs[b.day] += h; }
      const lv = b.level || '(no level)'; s.byLevel[lv] = (s.byLevel[lv]||0)+1;
      courts.forEach(function(c){ if (c>=1 && c<=COURT_COUNT) s.courtUse[c-1] += h; });
    });
    s.coaches = coachesFor(facId).size;
    return s;
  }
  function combine(list){
    const g = { count:0, classHrs:0, courtHrs:0, adult:0, junior:0, sem:0, morning:0, evening:0,
                byDay:[0,0,0,0,0,0,0], byDayHrs:[0,0,0,0,0,0,0], byLevel:{}, courtUse:[0,0,0,0,0,0], coaches:0 };
    list.forEach(function(s){
      g.count+=s.count; g.classHrs+=s.classHrs; g.courtHrs+=s.courtHrs; g.adult+=s.adult; g.junior+=s.junior;
      g.sem+=s.sem; g.morning+=s.morning; g.evening+=s.evening; g.coaches+=s.coaches;
      for (let i=0;i<7;i++){ g.byDay[i]+=s.byDay[i]; g.byDayHrs[i]+=s.byDayHrs[i]; }
      for (let i=0;i<6;i++){ g.courtUse[i]+=s.courtUse[i]; }
      Object.keys(s.byLevel).forEach(function(l){ g.byLevel[l]=(g.byLevel[l]||0)+s.byLevel[l]; });
    });
    return g;
  }

  function buildPane(){
    let el = document.getElementById('pane-totals');
    if (!el){ const m = document.getElementById('main') || document.body; el = document.createElement('div'); el.id='pane-totals'; el.className='hidden'; m.appendChild(el); }
    el.innerHTML =
      '<div class="t-filters" id="t-filters"></div>' +
      '<div class="t-legend" id="t-legend"></div>' +
      '<div class="t-section"><h3>Classes by level</h3><div id="t-levelbars"></div></div>' +
      '<div class="t-section"><h3>Detail by location</h3><div id="t-bylevel"></div></div>';
    return el;
  }

  function chip(attr, val, label, on){ return '<span class="t-chip '+(on?'on':'')+'" data-'+attr+'="'+val+'">'+label+'</span>'; }
  function renderFilters(){
    const el = document.getElementById('t-filters'); if (!el) return;
    const dayChips = DAYS.map(function(d,i){ return chip('fday', i, d, filters.days.has(i)); }).join('') +
      '<span class="t-chip" data-fday="all">All</span><span class="t-chip" data-fday="wd">Mon-Fri</span><span class="t-chip" data-fday="we">Sat-Sun</span>';
    const locChips = chip('floc','all','All',filters.loc==='all') + FACILITIES.map(function(f){ return chip('floc', f.id, f.name, filters.loc===f.id); }).join('');
    el.innerHTML =
      '<div class="t-fgroup"><span class="t-flabel">Location</span><div class="t-chips">'+locChips+'</div></div>' +
      '<div class="t-fgroup"><span class="t-flabel">Category</span><div class="t-chips">'+
        chip('fcat','all','All',filters.cat==='all')+chip('fcat','adult','Adult',filters.cat==='adult')+chip('fcat','junior','Junior',filters.cat==='junior')+'</div></div>' +
      '<div class="t-fgroup"><span class="t-flabel">Program</span><div class="t-chips">'+
        chip('fsem','all','All',filters.sem==='all')+chip('fsem','sem','Semester',filters.sem==='sem')+chip('fsem','reg','Non-semester',filters.sem==='reg')+'</div></div>' +
      '<div class="t-fgroup"><span class="t-flabel">Days</span><div class="t-chips">'+dayChips+'</div></div>' +
      '<div class="t-spacer"><button class="t-btn" id="t-reset">Reset</button><button class="t-btn" id="t-refresh" title="Re-load from database">&#8635; Refresh</button></div>';

    el.querySelectorAll('[data-floc]').forEach(function(c){ c.onclick=function(){ filters.loc=c.dataset.floc; renderFilters(); renderResults(); }; });
    el.querySelectorAll('[data-fcat]').forEach(function(c){ c.onclick=function(){ filters.cat=c.dataset.fcat; renderFilters(); renderResults(); }; });
    el.querySelectorAll('[data-fsem]').forEach(function(c){ c.onclick=function(){ filters.sem=c.dataset.fsem; renderFilters(); renderResults(); }; });
    el.querySelectorAll('[data-fday]').forEach(function(c){ c.onclick = function(){
      const v = c.dataset.fday;
      if (v==='all') filters.days = new Set([0,1,2,3,4,5,6]);
      else if (v==='wd') filters.days = new Set([0,1,2,3,4]);
      else if (v==='we') filters.days = new Set([5,6]);
      else { const i=+v; if (filters.days.has(i)) filters.days.delete(i); else filters.days.add(i); if (!filters.days.size) filters.days = new Set([0,1,2,3,4,5,6]); }
      renderFilters(); renderResults();
    }; });
    const rs = document.getElementById('t-reset'); if (rs) rs.onclick = function(){ filters = { days:new Set([0,1,2,3,4,5,6]), cat:'all', loc:'all', sem:'all', shift:'all', q:'' }; renderFilters(); renderResults(); };
    const rf = document.getElementById('t-refresh'); if (rf) rf.onclick = async function(){ rf.disabled=true; await load(); rf.disabled=false; renderResults(); };
  }

  function locationCard(f, s, totalCount){
    const adultPct = pct(s.adult, s.count);
    const maxDay = Math.max(1, Math.max.apply(null, s.byDay));
    const busiestIdx = s.byDay.reduce(function(best,v,i){ return v>s.byDay[best] ? i : best; }, 0);
    const busiest = s.count ? DAYS[busiestIdx]+' ('+s.byDay[busiestIdx]+')' : '—';
    const util = pct(s.courtHrs, WEEK_COURT_CAPACITY);
    const spark = s.byDay.map(function(v){ const h = Math.round(v/maxDay*24); return '<i style="height:'+Math.max(2,h)+'px;background:'+f.color+';opacity:'+(v?1:0.2)+'"></i>'; }).join('');
    return '<div class="t-card">' +
      '<div class="t-card-head" style="background:'+f.color+'">'+esc(f.name)+'<span style="font-size:12px;font-weight:600;opacity:0.85">'+pct(s.count,totalCount)+'% of all</span></div>' +
      '<div class="t-card-body">' +
        '<div class="t-bignum">'+s.count+' <span>classes</span></div>' +
        '<div class="t-spark">'+spark+'</div><div class="t-spark-lbl"><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span></div>' +
        '<div class="t-mini-lbl"><span>Adult '+s.adult+'</span><span>Junior '+s.junior+'</span></div>' +
        '<div class="t-mini"><i style="width:'+adultPct+'%;background:'+f.color+'"></i><i style="width:'+(100-adultPct)+'%;background:#cbd5d8"></i></div>' +
        '<div class="t-stat"><span>Class hours / wk</span><b>'+r1(s.classHrs)+'</b></div>' +
        '<div class="t-stat"><span>Court-hours / wk</span><b>'+r1(s.courtHrs)+'</b></div>' +
        '<div class="t-stat"><span>Court utilization</span><b>'+util+'%</b></div>' +
        '<div class="t-stat"><span>Morning / Evening</span><b>'+s.morning+' / '+s.evening+'</b></div>' +
        '<div class="t-stat"><span>Semester classes</span><b>'+s.sem+'</b></div>' +
        '<div class="t-stat"><span>Coaches rostered</span><b>'+s.coaches+'</b></div>' +
        '<div class="t-stat"><span>Busiest day</span><b>'+busiest+'</b></div>' +
      '</div></div>';
  }
  function grandCard(g){
    const adultPct = pct(g.adult, g.count);
    const levels = Object.keys(g.byLevel).length;
    const cap = WEEK_COURT_CAPACITY * FACILITIES.length;
    return '<div class="t-card grand">' +
      '<div class="t-card-head" style="background:linear-gradient(135deg,#1b4458,#2596b5)">All locations</div>' +
      '<div class="t-card-body">' +
        '<div class="t-bignum">'+g.count+' <span>classes</span></div>' +
        '<div class="t-mini-lbl"><span>Adult '+g.adult+'</span><span>Junior '+g.junior+'</span></div>' +
        '<div class="t-mini"><i style="width:'+adultPct+'%;background:#1b4458"></i><i style="width:'+(100-adultPct)+'%;background:#cbd5d8"></i></div>' +
        '<div class="t-stat"><span>Class hours / wk</span><b>'+r1(g.classHrs)+'</b></div>' +
        '<div class="t-stat"><span>Court-hours / wk</span><b>'+r1(g.courtHrs)+'</b></div>' +
        '<div class="t-stat"><span>Avg court utilization</span><b>'+pct(g.courtHrs, cap)+'%</b></div>' +
        '<div class="t-stat"><span>Morning / Evening</span><b>'+g.morning+' / '+g.evening+'</b></div>' +
        '<div class="t-stat"><span>Semester classes</span><b>'+g.sem+'</b></div>' +
        '<div class="t-stat"><span>Distinct levels</span><b>'+levels+'</b></div>' +
        '<div class="t-stat"><span>Coach slots / wk</span><b>'+g.coaches+'</b></div>' +
      '</div></div>';
  }

  function barSection(elId, getVal, labels){
    const el = document.getElementById(elId); if (!el) return;
    const summ = FACILITIES.map(function(f){ return { f:f, s:summarize(f.id) }; });
    const n = labels.length;
    const rowTotals = [];
    for (let i=0;i<n;i++){ rowTotals[i] = summ.reduce(function(a,x){ return a + getVal(x.s, i); }, 0); }
    const max = Math.max(1, Math.max.apply(null, rowTotals));
    let any = false;
    const rows = labels.map(function(lab,i){
      const segs = summ.map(function(x){
        const v = getVal(x.s, i); if (!v) return '';
        any = true;
        const w = v/max*100;
        return '<span class="t-bar" style="width:'+w+'%;background:'+x.f.color+'" title="'+esc(x.f.name)+': '+r1(v)+'">'+(w>9 ? r1(v) : '')+'</span>';
      }).join('');
      return '<div class="t-barrow"><span>'+esc(lab)+'</span><div class="t-bartrack">'+(segs || '<span style="color:var(--t-muted)">—</span>')+'<span class="t-bartot">'+r1(rowTotals[i])+'</span></div></div>';
    }).join('');
    el.innerHTML = any ? rows : '<div class="t-empty">Nothing matches the current filters.</div>';
  }

  function levelTable(){
    const el = document.getElementById('t-bylevel'); if (!el) return;
    const facs = facList();
    const summ = facs.map(function(f){ return summarize(f.id); });
    const levels = {};
    summ.forEach(function(s){ Object.keys(s.byLevel).forEach(function(l){ levels[l]=1; }); });
    const rows = Object.keys(levels).map(function(l){
      const vals = summ.map(function(s){ return s.byLevel[l]||0; });
      return { l:l, vals:vals, tot:vals.reduce(function(a,b){ return a+b; },0) };
    }).sort(function(a,b){ return b.tot-a.tot || a.l.localeCompare(b.l); });
    if (!rows.length){ el.innerHTML = '<div class="t-empty">No classes match the current filters.</div>'; return; }
    const colTot = facs.map(function(f,i){ return rows.reduce(function(a,r){ return a+r.vals[i]; }, 0); });
    const grand = colTot.reduce(function(a,b){ return a+b; }, 0);
    el.innerHTML =
      '<table class="t-table"><thead><tr><th>Level</th>'+facs.map(function(f){ return '<th>'+esc(f.name)+'</th>'; }).join('')+'<th>Total</th></tr></thead><tbody>' +
      rows.map(function(r){ return '<tr><td>'+esc(r.l)+'</td>'+r.vals.map(function(v){ return '<td>'+(v||'')+'</td>'; }).join('')+'<td><b>'+r.tot+'</b></td></tr>'; }).join('') +
      '</tbody><tfoot><tr class="total"><td>All levels</td>'+colTot.map(function(v){ return '<td>'+v+'</td>'; }).join('')+'<td>'+grand+'</td></tr></tfoot></table>';
  }

  function renderResults(){
    const facs = facList();
    const summ = facs.map(function(f){ return summarize(f.id); });
    const allLevels = {};
    summ.forEach(function(s){ Object.keys(s.byLevel).forEach(function(l){ allLevels[l] = (allLevels[l]||0) + s.byLevel[l]; }); });
    const levelNames = Object.keys(allLevels);
    const totalClasses = levelNames.reduce(function(a,l){ return a + allLevels[l]; }, 0);

    const legEl = document.getElementById('t-legend');
    if (legEl) legEl.innerHTML = facs.map(function(f){ return '<span><i style="background:'+f.color+'"></i>'+esc(f.name)+'</span>'; }).join('') +
      '<span><b style="color:var(--t-navy)">'+totalClasses+'</b> classes &middot; <b style="color:var(--t-navy)">'+levelNames.length+'</b> levels' +
      (filters.sem==='sem' ? ' &middot; semester only' : filters.sem==='reg' ? ' &middot; non-semester only' : '') + '</span>';

    const lb = document.getElementById('t-levelbars');
    if (lb){
      const rows = levelNames.map(function(l){ return { l:l, vals:summ.map(function(s){ return s.byLevel[l]||0; }), tot:allLevels[l] }; })
        .sort(function(a,b){ return b.tot - a.tot || a.l.localeCompare(b.l); });
      if (!rows.length){ lb.innerHTML = '<div class="t-empty">No classes match the current filters.</div>'; }
      else {
        const max = Math.max(1, rows[0].tot);
        lb.innerHTML = '<div class="t-bars">' + rows.map(function(r){
          const segs = facs.map(function(f,fi){ const v = r.vals[fi]; if (!v) return ''; const w = v/max*100;
            return '<span class="t-bar" style="width:'+w+'%;background:'+f.color+'" title="'+esc(f.name)+': '+v+'">'+(w>10 ? v : '')+'</span>'; }).join('');
          return '<div class="t-barrow"><span title="'+esc(r.l)+'">'+esc(r.l)+'</span><div class="t-bartrack">'+segs+'<span class="t-bartot">'+r.tot+'</span></div></div>';
        }).join('') + '</div>';
      }
    }
    levelTable();
  }

  console.log('[Totals] module loaded');
  window.TOT = {
    async open(){
      try {
        buildPane();
        await load();
        const p = document.getElementById('pane-totals'); if (p) p.classList.remove('hidden');
        renderFilters(); renderResults();
      } catch(e){
        console.error('[Totals] open', e);
        const el = document.getElementById('pane-totals');
        if (el) el.innerHTML = '<div style="padding:20px;color:#b00020;font-family:monospace;font-size:13px"><b>Totals error</b><br><br>'+esc(e.message||String(e))+'</div>';
      }
    }
  };
})();
</script>
</body>
</html>
